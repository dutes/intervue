name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (typecheck + build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client_web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck & build
        run: npm run build
      # Non-blocking for now: there is a known backlog of ESLint findings to clear. Once that
      # sweep lands, drop `continue-on-error` to make lint a hard gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true
