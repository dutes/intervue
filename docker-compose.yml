services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # The OpenAI API key is supplied per-session by the user in the web UI,
      # so it is intentionally not set here.
      - OPENAI_MODEL=gpt-5.2
    volumes:
      # Persist data (sessions, reports)
      - ./data:/app/data
